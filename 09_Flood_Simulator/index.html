<!DOCTYPE html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Flood Simulator Schweiz (2D)</title>
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
      crossorigin=""
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <aside class="panel">
        <h1>Hochwasser-Simulator</h1>
        <p class="subtitle">2D-Draufsicht für 5 Schweizer Städte</p>

        <label for="citySelect">Stadt</label>
        <select id="citySelect"></select>

        <label for="waterRise">Wasseranstieg (m)</label>
        <input id="waterRise" type="range" min="0" max="30" step="0.5" value="2" />

        <div class="status" id="waterLevelInfo"></div>

        <div class="legend">
          <span class="legend-swatch"></span>
          <span>potenziell überflutet</span>
        </div>

        <details>
          <summary>Hinweis zum Modell</summary>
          <p>
            Vereinfachte Badewannen-Simulation auf Basis frei verfügbarer Terrarium-Höhendaten.
            Sie zeigt potenziell gefährdete Flächen, ersetzt aber keine hydraulische Fachanalyse.
          </p>
        </details>
      </aside>

      <main>
        <div id="map"></div>
      </main>
    </div>

    <script
      src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
      integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
      crossorigin=""
    ></script>
    <script src="app.js"></script>
  </body>
</html>
