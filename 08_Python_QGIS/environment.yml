name: qgisenv

channels:
  - conda-forge        # primary channel – has current QGIS builds
  - defaults

dependencies:
  - python=3.12
  - qgis=3.40.*         # pin to 3.40.x LTS – must match your QGIS Desktop version
  - requests            # HTTP download of canton boundaries

# ─── Setup ──────────────────────────────────────────────────────────────────
# Create:   conda env create -f environment.yml
# Activate: conda activate qgisenv
# Run:      python swiss_cantons_language_map.py
